name: Publish Skill

on:
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Skill name (from skills/ directory)'
        required: true
        type: string
      version:
        description: 'Version (optional, defaults to patch)'
        required: false
        type: string
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill exists
        run: |
          SKILL_NAME="${{ github.event.inputs.skill_name }}"
          if [ ! -d "skills/$SKILL_NAME" ]; then
            echo "Error: Skill '$SKILL_NAME' not found in skills/ directory"
            exit 1
          fi
          echo "Found skill: $SKILL_NAME"
          ls -la "skills/$SKILL_NAME/"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: skills/${{ github.event.inputs.skill_name }}
        run: npm install

      - name: Build (if needed)
        working-directory: skills/${{ github.event.inputs.skill_name }}
        run: npm run build || echo "No build script, skipping"

      - name: Update version
        working-directory: skills/${{ github.event.inputs.skill_name }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi

      - name: Publish to npm
        working-directory: skills/${{ github.event.inputs.skill_name }}
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}